[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E501",   # line too long — not enforced, formatter handles it
]

[tool.ruff.lint.isort]
known-first-party = ["custom_components.aprs_is"]
