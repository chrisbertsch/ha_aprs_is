<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- === HT Radio === -->

  <!-- Antenna -->
  <rect x="43" y="10" width="7" height="68" rx="3.5" fill="#90a4ae"/>
  <!-- Antenna base connector -->
  <rect x="41" y="64" width="11" height="14" rx="3" fill="#78909c"/>

  <!-- Body -->
  <rect x="22" y="72" width="68" height="146" rx="10" fill="#37474f"/>
  <!-- Right edge shadow -->
  <rect x="85" y="82" width="5" height="126" rx="2.5" fill="#455a64"/>

  <!-- Speaker grille -->
  <line x1="36" y1="86"  x2="76" y2="86"  stroke="#263238" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="93"  x2="76" y2="93"  stroke="#263238" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="100" x2="76" y2="100" stroke="#263238" stroke-width="3" stroke-linecap="round"/>

  <!-- LCD Display -->
  <rect x="32" y="110" width="48" height="28" rx="4" fill="#0a1f0a"/>
  <text x="56" y="129" font-family="monospace" font-size="11"
        fill="#66bb6a" text-anchor="middle">144.390</text>

  <!-- PTT button (left side, red) -->
  <rect x="19" y="108" width="9" height="28" rx="4" fill="#e53935"/>

  <!-- Button grid 3×3 -->
  <circle cx="38" cy="156" r="5.5" fill="#546e7a"/>
  <circle cx="56" cy="156" r="5.5" fill="#546e7a"/>
  <circle cx="74" cy="156" r="5.5" fill="#546e7a"/>

  <circle cx="38" cy="174" r="5.5" fill="#546e7a"/>
  <circle cx="56" cy="174" r="5.5" fill="#546e7a"/>
  <circle cx="74" cy="174" r="5.5" fill="#546e7a"/>

  <circle cx="38" cy="192" r="5.5" fill="#546e7a"/>
  <circle cx="56" cy="192" r="5.5" fill="#546e7a"/>
  <circle cx="74" cy="192" r="5.5" fill="#546e7a"/>

  <!-- Mic port -->
  <rect x="35" y="207" width="42" height="5" rx="2.5" fill="#263238"/>

  <!-- === Text === -->
  <text x="178" y="148" font-family="Arial Black, Arial, sans-serif" font-size="52"
        font-weight="900" fill="#e53935" text-anchor="middle">APRS</text>
</svg>
