send_wx_report_from_entities:
  name: Send APRS Weather Report (from entities)
  description: >
    Send an APRS weather report by pointing to existing Home Assistant sensor entities.
    Units are detected automatically and converted — use any temperature, pressure, or
    speed sensor regardless of its unit system.
  fields:
    temperature_entity:
      name: Temperature sensor
      description: "Any temperature sensor (°C, °F, K). Converted to °F for the packet."
      required: false
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature
    humidity_entity:
      name: Humidity sensor
      description: Relative humidity sensor (%).
      required: false
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: humidity
    pressure_entity:
      name: Pressure sensor
      description: "Any pressure sensor (hPa, mb, inHg, PSI, kPa). Converted to mb."
      required: false
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: atmospheric_pressure
            - domain: sensor
              device_class: pressure
    wind_dir_entity:
      name: Wind direction sensor
      description: Wind direction sensor (degrees).
      required: false
      selector:
        entity:
          filter:
            - domain: sensor
    wind_speed_entity:
      name: Wind speed sensor
      description: "Any speed sensor (mph, km/h, m/s, kn). Converted to mph."
      required: false
      selector:
        entity:
          filter:
            - domain: sensor
    wind_gust_entity:
      name: Wind gust sensor
      description: "Any speed sensor (mph, km/h, m/s, kn). Converted to mph."
      required: false
      selector:
        entity:
          filter:
            - domain: sensor
    rain_1h_entity:
      name: Rain last 1h sensor
      description: "Precipitation sensor for last hour (mm or in). Converted to hundredths of an inch."
      required: false
      selector:
        entity:
          filter:
            - domain: sensor
    rain_24h_entity:
      name: Rain last 24h sensor
      description: "Precipitation sensor for last 24 hours (mm or in)."
