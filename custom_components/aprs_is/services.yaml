    luminosity_entity:
      name: Luminosity sensor
      description: "Solar irradiance sensor (W/m²)."
      required: false
      selector:
        entity:
          filter:
            - domain: sensor
    latitude:
      name: Latitude
      description: "Override the WX station latitude. Defaults to your HA home location."
      required: false
      selector:
        number:
          min: -90
          max: 90
          step: any
          mode: box
    longitude:
      name: Longitude
      description: "Override the WX station longitude. Defaults to your HA home location."
      required: false
      selector:
        number:
          min: -180
          max: 180
          step: any
          mode: box
    from_call:
      name: From callsign
      description: "Override the sending callsign (e.g. KE5YIM-13 for a dedicated WX callsign)."
      required: false
      selector:
        text:
    transport:
      name: Transport
      description: "Which transport to use. Both sends on APRS-IS and KISS TNC simultaneously (NOGATE is forced on the RF copy)."
      required: false
      default: auto
      selector:
        select:
          options:
            - label: "Auto (primary with fallback)"
              value: "auto"
            - label: "Both (APRS-IS + KISS TNC)"
              value: "both"
            - label: "APRS-IS"
              value: "aprs_is"
            - label: "KISS TNC (RF)"
              value: "kiss_tnc"
    nogate:
      name: NOGATE
