send_message:
  name: Send APRS Message
  description: Send a direct APRS message to a specific callsign.
  fields:
    to:
      name: To
      description: Destination callsign (e.g. W1ABC-9).
      required: true
      selector:
        text:
    message:
      name: Message
      description: Message text (max 67 characters).
      required: true
      selector:
        text:
          multiline: false
    from_call:
      name: From callsign
      description: Override the sending callsign. Defaults to the configured login callsign.
      required: false
      selector:
        text:
    transport:
      name: Transport
      description: "Which transport to use. Auto = primary with automatic fallback. Both is not available for messages — use auto, aprs_is, or kiss_tnc."
      required: false
      default: auto
      selector:
        select:
          options:
            - label: "Auto (primary with fallback)"
              value: "auto"
            - label: "APRS-IS"
              value: "aprs_is"
            - label: "KISS TNC (RF)"
              value: "kiss_tnc"
    nogate:
      name: NOGATE
      description: Append NOGATE to the AX.25 path, instructing IGates not to forward this packet to the internet. Only applies when transmitting via KISS TNC.
      required: false
      default: false
      selector:
        boolean:

send_bulletin:
  name: Send APRS Bulletin
  description: Send a numbered or named APRS bulletin.
  fields:
    bulletin_id:
      name: Bulletin ID
      description: "BLN0–BLN9 number or a name up to 5 characters (e.g. 0, 1, WEATHER)."
      required: true
      example: "0"
      selector:
        text:
    message:
      name: Message
      description: Bulletin text (max 67 characters).
      required: true
      selector:
        text:
          multiline: false
    from_call:
      name: From callsign
      description: Override the sending callsign.
      required: false
      selector:
        text:
    transport:
      name: Transport
      description: "Which transport to use. Both sends on APRS-IS and KISS TNC simultaneously (NOGATE is forced on the RF copy)."
      required: false
      default: auto
      selector:
        select:
          options:
            - label: "Auto (primary with fallback)"
              value: "auto"
            - label: "Both (APRS-IS + KISS TNC)"
              value: "both"
            - label: "APRS-IS"
              value: "aprs_is"
            - label: "KISS TNC (RF)"
              value: "kiss_tnc"
    nogate:
      name: NOGATE
      description: Append NOGATE to the AX.25 path. Only applies when transmitting via KISS TNC. Ignored when transport is Both (NOGATE is always forced in that mode).
      required: false
      default: false
      selector:
        boolean:

send_announcement:
  name: Send APRS Announcement
  description: "Send an APRS announcement (BLN_A–BLN_Z)."
  fields:
    announcement_id:
      name: Announcement ID
      description: Single letter A–Z.
      required: true
      example: "A"
      selector:
        text:
    message:
      name: Message
      description: Announcement text (max 67 characters).
      required: true
      selector:
        text:
          multiline: false
    from_call:
      name: From callsign
      description: Override the sending callsign.
      required: false
      selector:
        text:
    transport:
      name: Transport
      description: "Which transport to use. Both sends on APRS-IS and KISS TNC simultaneously (NOGATE is forced on the RF copy)."
      required: false
      default: auto
      selector:
        select:
          options:
            - label: "Auto (primary with fallback)"
              value: "auto"
            - label: "Both (APRS-IS + KISS TNC)"
              value: "both"
            - label: "APRS-IS"
              value: "aprs_is"
            - label: "KISS TNC (RF)"
              value: "kiss_tnc"
    nogate:
      name: NOGATE
      description: Append NOGATE to the AX.25 path. Only applies when transmitting via KISS TNC. Ignored when transport is Both.
      required: false
      default: false
      selector:
        boolean:

send_wx_report:
  name: Send APRS Weather Report
  description: Send an APRS weather report using values from Home Assistant sensors.
  fields:
    temperature_f:
      name: "Temperature (°F)"
      description: Outdoor temperature in Fahrenheit.
      required: false
      selector:
        number:
          min: -99
          max: 999
          unit_of_measurement: "°F"
          mode: box
    humidity:
      name: "Humidity (%)"
      description: Relative humidity 0–100.
      required: false
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
          mode: box
    pressure_mb:
      name: Pressure (mb)
      description: Barometric pressure in millibars.
      required: false
      selector:
        number:
          min: 0
          max: 9999
          unit_of_measurement: "mb"
          mode: box
    wind_dir:
      name: "Wind direction (°)"
      description: Wind direction 0–360.
      required: false
      selector:
        number:
          min: 0
          max: 360
          unit_of_measurement: "°"
          mode: box
    wind_speed_mph:
      name: Wind speed (mph)
      description: Sustained wind speed in mph.
      required: false
      selector:
        number:
          min: 0
          max: 999
          unit_of_measurement: "mph"
          mode: box
    wind_gust_mph:
      name: Wind gust (mph)
      description: Peak gust speed in mph.
      required: false
      selector:
        number:
          min: 0
          max: 999
          unit_of_measurement: "mph"
          mode: box
    rain_1h_hundredths:
      name: Rain last 1h (0.01 in)
      description: Rainfall in last hour in hundredths of an inch.
      required: false
      selector:
        number:
          min: 0
          max: 9999
          unit_of_measurement: "0.01 in"
          mode: box
    rain_24h_hundredths:
      name: Rain last 24h (0.01 in)
      description: Rainfall in last 24 hours in hundredths of an inch.
      required: false
      selector:
        number:
          min: 0
          max: 9999
          unit_of_measurement: "0.01 in"
          mode: box
    rain_midnight_hundredths:
      name: Rain since midnight (0.01 in)
      description: Rainfall since midnight in hundredths of an inch.
      required: false
      selector:
        number:
          min: 0
          max: 9999
          unit_of_measurement: "0.01 in"
          mode: box
    luminosity:
      name: "Luminosity (W/m²)"
      description: Solar radiation in watts per square meter.
      required: false
      selector:
        number:
          min: 0
          max: 9999
          unit_of_measurement: "W/m²"
          mode: box
    latitude:
      name: Latitude
      description: "Override the WX station latitude. Defaults to your HA home location."
      required: false
      selector:
        number:
          min: -90
          max: 90
          step: any
          mode: box
    longitude:
      name: Longitude
      description: "Override the WX station longitude. Defaults to your HA home location."
      required: false
      selector:
        number:
          min: -180
          max: 180
          step: any
          mode: box
    from_call:
      name: From callsign
      description: "Override the sending callsign (e.g. KE5YIM-13 for a dedicated WX callsign)."
      required: false
      selector:
        text:
    transport:
      name: Transport
      description: "Which transport to use. Both sends on APRS-IS and KISS TNC simultaneously (NOGATE is forced on the RF copy)."
      required: false
      default: auto
      selector:
        select:
          options:
            - label: "Auto (primary with fallback)"
              value: "auto"
            - label: "Both (APRS-IS + KISS TNC)"
              value: "both"
            - label: "APRS-IS"
              value: "aprs_is"
            - label: "KISS TNC (RF)"
              value: "kiss_tnc"
    nogate:
      name: NOGATE
      description: Append NOGATE to the AX.25 path. Only applies when transmitting via KISS TNC. Ignored when transport is Both.
      required: false
      default: false
      selector:
        boolean:

